<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - HRIS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar"></div>
    <main class="main-content">
        <div id="header"></div>
        <div class="page-content">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">📝</div>
                    <div class="stat-info"><h3 id="statPending">0</h3><p>Pending Assessment</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">✅</div>
                    <div class="stat-info"><h3 id="statCompleted">0</h3><p>Completed</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow">📊</div>
                    <div class="stat-info"><h3 id="statAvgScore">0</h3><p>Avg Interview Score</p></div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="card">
                <div class="card-header">
                    <h2>Assessment List</h2>
                    <div class="filter-bar">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search candidate or job..." onkeyup="filterTable('searchInput','assessmentTable')">
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table id="assessmentTable">
                            <thead>
                                <tr>
                                    <th>Candidate</th>
                                    <th>Job</th>
                                    <th>Interview Score</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="assessmentTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Assessment Detail Modal -->
    <div class="modal-overlay" id="assessmentDetailModal" onclick="if(event.target===this)closeModal('assessmentDetailModal')">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>Assessment Detail</h3>
                <button class="modal-close" onclick="closeModal('assessmentDetailModal')">&times;</button>
            </div>
            <div class="modal-body" id="assessmentDetailBody"></div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function renderAssessments() {
            var tbody = document.getElementById('assessmentTableBody');
            tbody.innerHTML = '';
            var stats = { pending: 0, completed: 0, totalScore: 0, count: 0 };

            for (var i = 0; i < DATA.candidates.length; i++) {
                var c = DATA.candidates[i];

                // Find interviews for this candidate with Pass decision
                var interviews = [];
                var hasPassInterview = false;
                var totalRating = 0;
                var ratingCount = 0;

                for (var j = 0; j < DATA.interviews.length; j++) {
                    if (DATA.interviews[j].candidate_id === c.id) {
                        interviews.push(DATA.interviews[j]);
                        if (DATA.interviews[j].status === 'Completed' && DATA.interviews[j].rating) {
                            totalRating += DATA.interviews[j].rating;
                            ratingCount++;
                        }
                        if (DATA.interviews[j].decision === 'Pass') {
                            hasPassInterview = true;
                        }
                    }
                }

                // Show candidates who passed interview or are in interview/selected stage
                if (hasPassInterview || c.status === 'Interview' || c.status === 'Offered' || c.status === 'Joined') {
                    stats.count++;
                    if (ratingCount > 0) stats.totalScore += totalRating;

                    var avgRating = ratingCount > 0 ? (totalRating / ratingCount).toFixed(1) : '-';
                    var isPending = (c.status !== 'Offered' && c.status !== 'Joined');

                    if (isPending) stats.pending++;
                    else stats.completed++;

                    var row = '<tr>' +
                        '<td><strong>' + c.first_name + ' ' + c.last_name + '</strong></td>' +
                        '<td>' + getJobTitle(c.job_id) + '</td>' +
                        '<td>' + avgRating + ' / 5</td>' +
                        '<td><span class="badge ' + getBadgeClass(c.status) + '">' + c.status + '</span></td>' +
                        '<td>' +
                            '<div class="btn-group">' +
                                '<button class="btn btn-sm btn-outline" onclick="window.viewAssessment(' + c.id + ')">View Details</button>' +
                                (isPending ? '<button class="btn btn-sm btn-success" onclick="window.completeAssessment(' + c.id + ')">Complete Assessment</button>' : '') +
                            '</div>' +
                        '</td>' +
                    '</tr>';
                    tbody.innerHTML += row;
                }
            }

            document.getElementById('statPending').textContent = stats.pending;
            document.getElementById('statCompleted').textContent = stats.completed;
            document.getElementById('statAvgScore').textContent = stats.count > 0 ? (stats.totalScore / stats.count).toFixed(1) : '0';
        }

        window.viewAssessment = function(candidateId) {
            var c = null;
            for (var i = 0; i < DATA.candidates.length; i++) {
                if (DATA.candidates[i].id === candidateId) { c = DATA.candidates[i]; break; }
            }
            if (!c) return;

            var interviews = [];
            for (var i = 0; i < DATA.interviews.length; i++) {
                if (DATA.interviews[i].candidate_id === candidateId) {
                    interviews.push(DATA.interviews[i]);
                }
            }

            var html = '';

            // Candidate info section
            html += '<div class="form-section">';
            html += '<div class="form-section-title">Candidate Information</div>';
            html += '<div class="form-row-2">';
            html += '<div class="form-group"><label>Name</label><div>' + c.first_name + ' ' + c.last_name + '</div></div>';
            html += '<div class="form-group"><label>Job Applied</label><div>' + getJobTitle(c.job_id) + '</div></div>';
            html += '<div class="form-group"><label>Email</label><div>' + (c.email || '-') + '</div></div>';
            html += '<div class="form-group"><label>Phone</label><div>' + (c.phone || '-') + '</div></div>';
            html += '<div class="form-group"><label>Status</label><div><span class="badge ' + getBadgeClass(c.status) + '">' + c.status + '</span></div></div>';
            html += '<div class="form-group"><label>Applied At</label><div>' + formatDateTime(c.applied_at) + '</div></div>';
            html += '</div></div>';

            // Interview feedback section
            if (interviews.length > 0) {
                html += '<div class="form-section">';
                html += '<div class="form-section-title">Interview Feedback</div>';
                for (var i = 0; i < interviews.length; i++) {
                    var iv = interviews[i];
                    html += '<div style="background:var(--gray-50);border-radius:6px;padding:16px;margin-bottom:12px;">';
                    html += '<div class="form-row-2">';
                    html += '<div class="form-group"><label>Round</label><div>' + (iv.round_name || 'Round ' + iv.round) + '</div></div>';
                    html += '<div class="form-group"><label>Type</label><div>' + (iv.type || '-') + '</div></div>';
                    html += '<div class="form-group"><label>Date</label><div>' + formatDateTime(iv.date) + '</div></div>';
                    html += '<div class="form-group"><label>Interviewer</label><div>' + (iv.interviewer || '-') + '</div></div>';
                    html += '<div class="form-group"><label>Rating</label><div><strong>' + (iv.rating || '-') + '</strong> / 5</div></div>';
                    html += '<div class="form-group"><label>Decision</label><div><span class="badge ' + getBadgeClass(iv.decision) + '">' + (iv.decision || '-') + '</span></div></div>';
                    html += '</div>';
                    if (iv.feedback) {
                        html += '<div class="form-group"><label>Feedback</label><div>' + iv.feedback + '</div></div>';
                    }
                    html += '</div>';
                }
                html += '</div>';
            }

            if (!interviews.length) {
                html += '<p class="text-muted">No interview records found for this candidate.</p>';
            }

            document.getElementById('assessmentDetailBody').innerHTML = html;
            openModal('assessmentDetailModal');
        };

        window.completeAssessment = function(candidateId) {
            for (var i = 0; i < DATA.candidates.length; i++) {
                if (DATA.candidates[i].id === candidateId) {
                    DATA.candidates[i].status = 'Offered';
                    break;
                }
            }
            showAlert('Assessment completed. Candidate moved to Offered stage.', 'success');
            renderAssessments();
        };

        renderAssessments();
        var BASE_URL = '..';
        renderSidebar('assessment');
        renderHeader('Assessment', 'Home / Recruitment / Assessment');
    </script>
</body>
</html>
