<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP HRIS - Employee Master</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar"></div>
    <main class="main-content">
        <div id="header"></div>
        <div class="page-content">
            <div class="stats-grid" id="statsGrid"></div>

            <div class="card">
                <div class="card-header">
                    <h2>Employee List</h2>
                    <div class="filter-bar">
                        <select class="form-control" id="deptFilter" onchange="applyFilters()">
                            <option value="">All Departments</option>
                        </select>
                        <div class="search-box">
                            <span class="search-icon">&#128269;</span>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search employee..." onkeyup="applyFilters()">
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table id="employeeTable">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Employee Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Joining Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="employeeBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- View Employee Modal -->
    <div class="modal-overlay" id="viewModal" onclick="if(event.target===this)closeModal('viewModal')">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>Employee Profile</h3>
                <button class="modal-close" onclick="closeModal('viewModal')">&times;</button>
            </div>
            <div class="modal-body" id="viewModalBody"></div>
        </div>
    </div>

    <!-- Edit Employee Modal -->
    <div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal('editModal')">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>Edit Employee</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editEmpId">
                <div class="form-section">
                    <div class="form-section-title"><span class="section-icon">&#128100;</span> Personal Information</div>
                    <div class="form-row-2">
                        <div class="form-group"><label>First Name</label><input type="text" class="form-control" id="editFirstName"></div>
                        <div class="form-group"><label>Last Name</label><input type="text" class="form-control" id="editLastName"></div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Email</label><input type="email" class="form-control" id="editEmail"></div>
                        <div class="form-group"><label>Phone</label><input type="text" class="form-control" id="editPhone"></div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Department</label>
                            <select class="form-control" id="editDept"></select>
                        </div>
                        <div class="form-group"><label>Designation</label>
                            <select class="form-control" id="editDesignation"></select>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Date of Birth</label><input type="date" class="form-control" id="editDob"></div>
                        <div class="form-group"><label>Gender</label>
                            <select class="form-control" id="editGender"><option>Male</option><option>Female</option><option>Other</option></select>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Blood Group</label>
                            <select class="form-control" id="editBlood"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
                        </div>
                        <div class="form-group"><label>NID</label><input type="text" class="form-control" id="editNid"></div>
                    </div>
                    <div class="form-group"><label>Present Address</label><textarea class="form-control" id="editAddress" rows="2"></textarea></div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><span class="section-icon">&#128188;</span> Employment Details</div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Joining Date</label><input type="date" class="form-control" id="editJoining"></div>
                        <div class="form-group"><label>Salary</label><input type="number" class="form-control" id="editSalary"></div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Status</label>
                            <select class="form-control" id="editStatus">
                                <option>Probation</option><option>Confirmed</option><option>Extended</option><option>Terminated</option><option>Resigned</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Type</label>
                            <select class="form-control" id="editType">
                                <option>Permanent</option><option>Contractual</option><option>Probationary</option><option>Intern</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mt-24">
                    <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
                    <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Change Modal -->
    <div class="modal-overlay" id="statusModal" onclick="if(event.target===this)closeModal('statusModal')">
        <div class="modal">
            <div class="modal-header">
                <h3>Change Employee Status</h3>
                <button class="modal-close" onclick="closeModal('statusModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="statusEmpId">
                <p style="margin-bottom:16px">Change status for: <strong id="statusEmpName"></strong></p>
                <div class="form-group">
                    <label>New Status <span class="required">*</span></label>
                    <select class="form-control" id="newStatus">
                        <option value="">Select Status</option>
                        <option value="Probation">Probation</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Extended">Extended</option>
                        <option value="Terminated">Terminated</option>
                        <option value="Resigned">Resigned</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Reason <span class="required">*</span></label>
                    <textarea class="form-control" id="statusReason" rows="3" placeholder="Enter reason for status change..."></textarea>
                </div>
                <div class="mt-24">
                    <button class="btn btn-warning" onclick="changeStatus()">Update Status</button>
                    <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        var BASE_URL = '..';
        renderSidebar('employee_master');
        renderHeader('Employee Master', 'Home / Employee / Employee Master');

        function renderStats() {
            var all = DATA.employees.length;
            var probation = DATA.employees.filter(function(e) { return e.status === 'Probation'; }).length;
            var confirmed = DATA.employees.filter(function(e) { return e.status === 'Confirmed'; }).length;
            var terminated = DATA.employees.filter(function(e) { return e.status === 'Terminated' || e.status === 'Resigned'; }).length;
            document.getElementById('statsGrid').innerHTML =
                '<div class="stat-card"><div class="stat-icon blue">&#128101;</div><div class="stat-info"><h3>' + all + '</h3><p>Total Employees</p></div></div>' +
                '<div class="stat-card"><div class="stat-icon yellow">&#128203;</div><div class="stat-info"><h3>' + probation + '</h3><p>Probation</p></div></div>' +
                '<div class="stat-card"><div class="stat-icon green">&#9989;</div><div class="stat-info"><h3>' + confirmed + '</h3><p>Confirmed</p></div></div>' +
                '<div class="stat-card"><div class="stat-icon red">&#128683;</div><div class="stat-info"><h3>' + terminated + '</h3><p>Terminated</p></div></div>';
        }

        function populateDeptFilter() {
            var sel = document.getElementById('deptFilter');
            for (var i = 0; i < DATA.departments.length; i++) {
                sel.innerHTML += '<option value="' + DATA.departments[i].name.toLowerCase() + '">' + DATA.departments[i].name + '</option>';
            }
        }

        function applyFilters() {
            var deptVal = document.getElementById('deptFilter').value;
            var searchVal = document.getElementById('searchInput').value.toLowerCase();
            var rows = document.querySelectorAll('#employeeTable tbody tr');
            for (var i = 0; i < rows.length; i++) {
                var dept = rows[i].getAttribute('data-dept');
                var name = rows[i].getAttribute('data-name');
                var code = rows[i].getAttribute('data-code');
                var show = true;
                if (deptVal && dept !== deptVal) show = false;
                if (searchVal) {
                    if (name.indexOf(searchVal) === -1 && code.indexOf(searchVal) === -1) show = false;
                }
                rows[i].style.display = show ? '' : 'none';
            }
        }

        function renderTable() {
            var html = '';
            for (var i = 0; i < DATA.employees.length; i++) {
                var e = DATA.employees[i];
                var name = getEmployeeName(e.id);
                var dept = getDeptName(e.dept_id);
                var desig = getDesignationName(e.designation_id);
                html += '<tr data-dept="' + dept.toLowerCase() + '" data-name="' + name.toLowerCase() + '" data-code="' + e.code.toLowerCase() + '">' +
                    '<td>' + e.code + '</td>' +
                    '<td>' + name + '</td>' +
                    '<td>' + e.email + '</td>' +
                    '<td>' + (e.phone || '-') + '</td>' +
                    '<td>' + dept + '</td>' +
                    '<td>' + desig + '</td>' +
                    '<td>' + formatDate(e.joining_date) + '</td>' +
                    '<td><span class="badge ' + getBadgeClass(e.status) + '">' + e.status + '</span></td>' +
                    '<td>' +
                        '<div class="btn-group">' +
                            '<button class="btn btn-sm btn-outline" onclick="viewEmployee(' + i + ')">View</button>' +
                            '<button class="btn btn-sm btn-primary" onclick="editEmployee(' + i + ')">Edit</button>' +
                            '<select class="form-control" style="width:auto;min-width:120px;padding:4px 8px;font-size:12px" onchange="openStatusChange(' + i + ',this.value)">' +
                                '<option value="">Status...</option>' +
                                '<option value="Probation">Probation</option>' +
                                '<option value="Confirmed">Confirmed</option>' +
                                '<option value="Extended">Extended</option>' +
                                '<option value="Terminated">Terminated</option>' +
                                '<option value="Resigned">Resigned</option>' +
                            '</select>' +
                        '</div>' +
                    '</td>' +
                    '</tr>';
            }
            document.getElementById('employeeBody').innerHTML = html || '<tr><td colspan="9" class="text-muted text-center">No employees found</td></tr>';
        }

        function viewEmployee(index) {
            var e = DATA.employees[index];
            if (!e) return;
            var name = getEmployeeName(e.id);
            var initials = name.split(' ').map(function(s) { return s.charAt(0); }).join('').toUpperCase();
            var dept = getDeptName(e.dept_id);
            var desig = getDesignationName(e.designation_id);

            var html = '<div class="profile-card">' +
                '<div class="profile-avatar">' + initials + '</div>' +
                '<div style="flex:1"><h3 style="font-size:18px;font-weight:600">' + name + '</h3><p style="color:var(--gray-500);font-size:13px">' + e.code + ' | ' + desig + '</p></div>' +
                '<div><span class="badge ' + getBadgeClass(e.status) + '" style="font-size:12px;padding:4px 14px">' + e.status + '</span></div>' +
                '</div>';

            html += '<div class="form-section"><div class="form-section-title"><span class="section-icon">&#128100;</span> Personal Information</div>' +
                '<div class="profile-details">' +
                    '<div class="detail-item"><label>Email</label><span>' + e.email + '</span></div>' +
                    '<div class="detail-item"><label>Phone</label><span>' + (e.phone || '-') + '</span></div>' +
                    '<div class="detail-item"><label>Department</label><span>' + dept + '</span></div>' +
                    '<div class="detail-item"><label>Designation</label><span>' + desig + '</span></div>' +
                    '<div class="detail-item"><label>Date of Birth</label><span>' + formatDate(e.dob) + '</span></div>' +
                    '<div class="detail-item"><label>Gender</label><span>' + (e.gender || '-') + '</span></div>' +
                    '<div class="detail-item"><label>Blood Group</label><span>' + (e.blood_group || '-') + '</span></div>' +
                    '<div class="detail-item"><label>NID</label><span>' + (e.nid || '-') + '</span></div>' +
                    '<div class="detail-item" style="grid-column:1/-1"><label>Present Address</label><span>' + (e.present_address || '-') + '</span></div>' +
                '</div></div>';

            html += '<div class="form-section"><div class="form-section-title"><span class="section-icon">&#128188;</span> Employment Details</div>' +
                '<div class="profile-details">' +
                    '<div class="detail-item"><label>Joining Date</label><span>' + formatDate(e.joining_date) + '</span></div>' +
                    '<div class="detail-item"><label>Salary</label><span>' + formatCurrency(e.salary, 'BDT ') + '</span></div>' +
                    '<div class="detail-item"><label>Status</label><span>' + e.status + '</span></div>' +
                    '<div class="detail-item"><label>Type</label><span>' + (e.type || '-') + '</span></div>' +
                '</div></div>';

            document.getElementById('viewModalBody').innerHTML = html;
            openModal('viewModal');
        }

        function populateEditDepts() {
            var sel = document.getElementById('editDept');
            sel.innerHTML = '';
            for (var i = 0; i < DATA.departments.length; i++) {
                sel.innerHTML += '<option value="' + DATA.departments[i].id + '">' + DATA.departments[i].name + '</option>';
            }
        }

        function populateEditDesigs() {
            var sel = document.getElementById('editDesignation');
            sel.innerHTML = '';
            for (var i = 0; i < DATA.designations.length; i++) {
                sel.innerHTML += '<option value="' + DATA.designations[i].id + '">' + DATA.designations[i].name + '</option>';
            }
        }

        function editEmployee(index) {
            var e = DATA.employees[index];
            if (!e) return;
            document.getElementById('editEmpId').value = index;
            document.getElementById('editFirstName').value = e.first_name;
            document.getElementById('editLastName').value = e.last_name;
            document.getElementById('editEmail').value = e.email;
            document.getElementById('editPhone').value = e.phone || '';
            document.getElementById('editDept').value = e.dept_id;
            document.getElementById('editDesignation').value = e.designation_id;
            document.getElementById('editDob').value = e.dob || '';
            document.getElementById('editGender').value = e.gender || 'Male';
            document.getElementById('editBlood').value = e.blood_group || 'A+';
            document.getElementById('editNid').value = e.nid || '';
            document.getElementById('editAddress').value = e.present_address || '';
            document.getElementById('editJoining').value = e.joining_date || '';
            document.getElementById('editSalary').value = e.salary || '';
            document.getElementById('editStatus').value = e.status || 'Probation';
            document.getElementById('editType').value = e.type || 'Permanent';
            openModal('editModal');
        }

        function saveEdit() {
            var index = parseInt(document.getElementById('editEmpId').value);
            var e = DATA.employees[index];
            if (!e) return;
            e.first_name = document.getElementById('editFirstName').value;
            e.last_name = document.getElementById('editLastName').value;
            e.email = document.getElementById('editEmail').value;
            e.phone = document.getElementById('editPhone').value;
            e.dept_id = parseInt(document.getElementById('editDept').value);
            e.designation_id = parseInt(document.getElementById('editDesignation').value);
            e.dob = document.getElementById('editDob').value;
            e.gender = document.getElementById('editGender').value;
            e.blood_group = document.getElementById('editBlood').value;
            e.nid = document.getElementById('editNid').value;
            e.present_address = document.getElementById('editAddress').value;
            e.joining_date = document.getElementById('editJoining').value;
            e.salary = parseFloat(document.getElementById('editSalary').value) || 0;
            e.status = document.getElementById('editStatus').value;
            e.type = document.getElementById('editType').value;
            showAlert('Employee updated successfully', 'success');
            closeModal('editModal');
            renderTable();
            renderStats();
        }

        function openStatusChange(index, newStatus) {
            if (!newStatus) return;
            var e = DATA.employees[index];
            if (!e) return;
            document.getElementById('statusEmpId').value = index;
            document.getElementById('statusEmpName').textContent = getEmployeeName(e.id);
            document.getElementById('newStatus').value = newStatus;
            document.getElementById('statusReason').value = '';
            openModal('statusModal');
        }

        function changeStatus() {
            var index = parseInt(document.getElementById('statusEmpId').value);
            var e = DATA.employees[index];
            if (!e) return;
            var newStatus = document.getElementById('newStatus').value;
            var reason = document.getElementById('statusReason').value;
            if (!newStatus || !reason) { showAlert('Please select status and provide reason', 'error'); return; }
            e.status = newStatus;
            DATA.lifecycleLogs.push({
                id: DATA.lifecycleLogs.length + 1,
                emp_id: e.id,
                event: 'status_changed',
                label: 'Status Changed to ' + newStatus,
                desc: reason,
                date: new Date().toISOString().slice(0,10),
                module: 'employee_master'
            });
            showAlert('Employee status changed to ' + newStatus, 'success');
            closeModal('statusModal');
            renderTable();
            renderStats();
        }

        populateDeptFilter();
        populateEditDepts();
        populateEditDesigs();
        renderStats();
        renderTable();
    </script>
</body>
</html>
